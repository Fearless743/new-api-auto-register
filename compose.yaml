services:
  app:
    image: ghcr.io/fearless743/new-api-auto-register:latest
    container_name: new-api-auto-register
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TOKEN_CSV_PATH: /app/data/tokens.csv
      TOKEN_TXT_PATH: /app/data/tokens.txt
      SESSION_CSV_PATH: /app/data/sessions.csv
      BALANCE_CSV_PATH: /app/data/balances.csv
      USER_ID_CSV_PATH: /app/data/user-ids.csv
      CHECKIN_RESULT_CSV_PATH: /app/data/checkin-results.csv
    volumes:
      - ./data:/app/data
